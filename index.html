<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancionero Karaoke — Buscador</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

:root{
  --bg-deep:#241634;
  --bg-deep-2:#1a0f27;
  --bg-card:#FFF8ED;
  --accent-magenta:#E63986;
  --accent-gold:#F2B705;
  --accent-teal:#1FA7A0;
  --text-dark:#2B1B3D;
  --text-light:#FFF8ED;
  --led-bg:#150C1F;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  background:
    radial-gradient(circle at 15% 0%, rgba(230,57,134,0.18), transparent 45%),
    radial-gradient(circle at 90% 10%, rgba(242,183,5,0.12), transparent 40%),
    var(--bg-deep);
  color:var(--text-light);
  font-family:'Work Sans', sans-serif;
  min-height:100vh;
  padding-bottom:60px;
}

header{
  padding:48px 24px 34px;
  text-align:center;
  border-bottom:2px dashed rgba(255,248,237,0.15);
}

.eyebrow{
  font-family:'Share Tech Mono', monospace;
  letter-spacing:0.35em;
  font-size:12px;
  color:var(--accent-gold);
  text-transform:uppercase;
  margin-bottom:14px;
}

h1{
  font-family:'Anton', sans-serif;
  font-weight:400;
  font-size:clamp(38px, 8vw, 78px);
  line-height:0.95;
  color:var(--text-light);
  text-shadow:0 0 18px rgba(230,57,134,0.55), 3px 3px 0 var(--accent-magenta);
}

.subtitle{
  margin-top:14px;
  font-size:15px;
  color:rgba(255,248,237,0.7);
  max-width:520px;
  margin-left:auto;
  margin-right:auto;
}

.controls{
  max-width:900px;
  margin:32px auto 0;
  padding:0 24px;
}

.search-row{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}

.search-box{
  flex:1 1 260px;
  position:relative;
}

.search-box input{
  width:100%;
  padding:16px 20px 16px 48px;
  border-radius:999px;
  border:2px solid rgba(255,248,237,0.15);
  background:var(--bg-deep-2);
  color:var(--text-light);
  font-family:'Work Sans', sans-serif;
  font-size:16px;
  outline:none;
  transition:border-color .2s ease, box-shadow .2s ease;
}
.search-box input::placeholder{ color:rgba(255,248,237,0.4); }
.search-box input:focus{
  border-color:var(--accent-magenta);
  box-shadow:0 0 0 4px rgba(230,57,134,0.18);
}

.search-icon{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  opacity:0.55;
}

.num-jump{
  width:110px;
  padding:16px 14px;
  border-radius:999px;
  border:2px solid rgba(255,248,237,0.15);
  background:var(--bg-deep-2);
  color:var(--accent-gold);
  font-family:'Share Tech Mono', monospace;
  font-size:16px;
  text-align:center;
  outline:none;
}
.num-jump::placeholder{ color:rgba(242,183,5,0.35); }
.num-jump:focus{ border-color:var(--accent-gold); box-shadow:0 0 0 4px rgba(242,183,5,0.15); }

.genre-select{
  padding:15px 18px;
  border-radius:999px;
  border:2px solid rgba(255,248,237,0.15);
  background:var(--bg-deep-2);
  color:var(--text-light);
  font-family:'Work Sans', sans-serif;
  font-weight:600;
  font-size:14px;
  outline:none;
  max-width:220px;
}
.genre-select:focus{ border-color:var(--accent-teal); }

.chips{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

.chip{
  padding:9px 18px;
  border-radius:999px;
  border:1.5px solid rgba(255,248,237,0.2);
  background:transparent;
  color:rgba(255,248,237,0.75);
  font-family:'Work Sans', sans-serif;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  transition:all .15s ease;
  letter-spacing:0.02em;
}
.chip:hover{ border-color:var(--accent-teal); color:var(--text-light); }
.chip.active{
  background:var(--accent-teal);
  border-color:var(--accent-teal);
  color:var(--bg-deep);
}

.results-meta{
  max-width:900px;
  margin:26px auto 14px;
  padding:0 24px;
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  font-family:'Share Tech Mono', monospace;
  font-size:12px;
  color:rgba(255,248,237,0.45);
  letter-spacing:0.08em;
  text-transform:uppercase;
  flex-wrap:wrap;
  gap:6px;
}

.song-list{
  max-width:900px;
  margin:0 auto;
  padding:0 24px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.song-card{
  background:var(--bg-card);
  border-radius:14px;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
  transition:transform .15s ease, box-shadow .15s ease;
}
.song-card:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(230,57,134,0.25);
}

.led{
  flex:0 0 auto;
  background:var(--led-bg);
  border-radius:8px;
  padding:10px 12px;
  min-width:64px;
  text-align:center;
  font-family:'Share Tech Mono', monospace;
  font-size:18px;
  color:var(--accent-magenta);
  text-shadow:0 0 8px rgba(230,57,134,0.85), 0 0 2px rgba(230,57,134,0.9);
  letter-spacing:1px;
}

.song-info{ flex:1; min-width:0; }

.song-title{
  font-weight:700;
  font-size:16px;
  color:var(--text-dark);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.song-artist{
  font-size:13px;
  color:#6b5a80;
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.genre-tag{
  flex:0 0 auto;
  font-size:10.5px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.04em;
  padding:6px 12px;
  border-radius:999px;
  color:var(--bg-deep);
  background:var(--accent-teal);
  white-space:nowrap;
  max-width:150px;
  overflow:hidden;
  text-overflow:ellipsis;
}

.sing-btn{
  flex:0 0 auto;
  background:var(--accent-magenta);
  color:var(--text-light);
  border:none;
  padding:10px 18px;
  border-radius:999px;
  font-family:'Work Sans', sans-serif;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  transition:background .15s ease, transform .15s ease;
}
.sing-btn:hover{ background:#cf2b73; transform:scale(1.04); }
.sing-btn:active{ transform:scale(0.97); }

.empty-state{
  text-align:center;
  padding:60px 24px;
  color:rgba(255,248,237,0.55);
}
.empty-state .big{
  font-family:'Anton', sans-serif;
  font-size:26px;
  color:var(--accent-gold);
  margin-bottom:8px;
}

.more-hint{
  text-align:center;
  padding:18px;
  font-size:13px;
  color:rgba(255,248,237,0.45);
}

footer{
  text-align:center;
  margin-top:50px;
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  letter-spacing:0.1em;
  color:rgba(255,248,237,0.35);
  text-transform:uppercase;
}

@media (max-width:520px){
  .num-jump{ width:100%; order:2; }
  .genre-select{ width:100%; max-width:none; order:3; }
  .song-card{ flex-wrap:wrap; }
  .song-info{ flex-basis:100%; order:1; }
  .led{ order:0; }
  .genre-tag{ order:2; }
  .sing-btn{ order:3; margin-left:auto; }
}
</style>
</head>
<body>

<header>
  <div class="eyebrow">Karaoke Night · Cancionero 2024</div>
  <h1>CANCIONERO</h1>
  <p class="subtitle" id="subtitleText">Busca por número, título, artista o género.</p>
</header>

<div class="controls">
  <div class="search-row">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Ej. Bad Bunny, Vivir Mi Vida..." autocomplete="off">
    </div>
    <input id="numInput" class="num-jump" type="text" placeholder="N.º código" inputmode="numeric" maxlength="6">
    <select id="genreSelect" class="genre-select">
      <option value="">Todos los géneros</option>
    </select>
  </div>
  <div class="chips" id="genreChips"></div>
</div>

<div class="results-meta">
  <span id="resultCount">Cargando...</span>
  <span id="totalCount"></span>
</div>

<div class="song-list" id="songList"></div>

<footer>Mockup de interfaz — datos cargados desde CANCIONERO_2024.xlsx, sin conexión a base de datos real</footer>

<script src="songs_data.js"></script>
<script>
const MAX_RESULTS = 150;
let activeGenre = "";

const topGenres = ["BALADA","POP","CUMBIA","RANCHERA","REGGAETON","SALSA","ROCK","VALLENATO","BACHATA","BOLERO"];

// Chips rápidos con los géneros más comunes
const chipsEl = document.getElementById('genreChips');
["TODOS", ...topGenres].forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'chip' + (g === "TODOS" ? " active" : "");
  btn.textContent = g === "TODOS" ? "Todos" : g;
  btn.onclick = () => {
    activeGenre = g === "TODOS" ? "" : g;
    document.getElementById('genreSelect').value = activeGenre;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  chipsEl.appendChild(btn);
});

// Select con TODOS los géneros (231), ordenado alfabéticamente
const selectEl = document.getElementById('genreSelect');
const allGenres = [...new Set(SONGS.map(s => s.g))].sort((a,b) => a.localeCompare(b));
allGenres.forEach(g => {
  const opt = document.createElement('option');
  opt.value = g;
  opt.textContent = g;
  selectEl.appendChild(opt);
});
selectEl.addEventListener('change', () => {
  activeGenre = selectEl.value;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if (!activeGenre) chipsEl.firstChild.classList.add('active');
  render();
});

document.getElementById('totalCount').textContent = `${SONGS.length.toLocaleString('es')} canciones en el cancionero`;

function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const numQ = document.getElementById('numInput').value.trim();
  const listEl = document.getElementById('songList');

  if (!q && !numQ && !activeGenre){
    listEl.innerHTML = `<div class="empty-state">
        <div class="big">Empieza a buscar</div>
        <div>Escribe un título, artista, número de código, o elige un género para ver resultados.</div>
      </div>`;
    document.getElementById('resultCount').textContent = '0 canciones mostradas';
    return;
  }

  let filtered = SONGS.filter(s => {
    const matchesGenre = !activeGenre || s.g === activeGenre;
    const matchesText = !q || s.t.toLowerCase().includes(q) || s.a.toLowerCase().includes(q);
    const matchesNum = !numQ || String(s.n).includes(numQ);
    return matchesGenre && matchesText && matchesNum;
  });

  filtered.sort((a,b) => a.t.localeCompare(b.t));
  const totalMatches = filtered.length;
  const shown = filtered.slice(0, MAX_RESULTS);

  document.getElementById('resultCount').textContent =
    `${totalMatches.toLocaleString('es')} resultado${totalMatches === 1 ? '' : 's'}`;

  if (totalMatches === 0){
    listEl.innerHTML = `<div class="empty-state">
        <div class="big">Sin resultados</div>
        <div>Prueba con otro nombre, artista, código o género.</div>
      </div>`;
    return;
  }

  listEl.innerHTML = shown.map(s => `
    <div class="song-card">
      <div class="led">${s.n}</div>
      <div class="song-info">
        <div class="song-title">${s.t}</div>
        <div class="song-artist">${s.a}</div>
      </div>
      <div class="genre-tag">${s.g}</div>
      <button class="sing-btn" onclick="alert('Añadido a la cola: ${s.t.replace(/'/g,"\\'")}')">Cantar</button>
    </div>
  `).join('');

  if (totalMatches > MAX_RESULTS){
    listEl.insertAdjacentHTML('beforeend',
      `<div class="more-hint">Mostrando ${MAX_RESULTS} de ${totalMatches.toLocaleString('es')} — sigue escribiendo para acotar la búsqueda.</div>`);
  }
}

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('numInput').addEventListener('input', render);

render();
</script>

</body>
</html>
